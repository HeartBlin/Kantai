name: Check flake

on: [ push, pull_request, workflow_dispatch ]

jobs:
  check:
    name: Lint (statix, deadnix, alejandra-custom) and check flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          install_url: https://nixos.org/nix/install
          extra_nix_config: experimental-features = nix-command flakes pipe-operators
      - uses: cachix/cachix-action@v17
        with:
          name: kantai

      - name: Run statix
        run: nix run nixpkgs#statix -- check .
      - name: Run deadnix
        run: nix run nixpkgs#deadnix -- .
      - name: Run alejandra-custom
        run: nix run .#alejandra-custom -- check .
      - name: Check flake
        run: nix flake check
